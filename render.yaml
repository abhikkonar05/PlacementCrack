services:
  # PlacementCrack FastAPI Backend Service
  - type: web
    name: placementcrack-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: DEVELOPER_MODE
        value: "True"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
